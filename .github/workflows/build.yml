name: Build Windows Exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pushd $env:GITHUB_WORKSPACE
          pyinstaller --noconfirm bank_stmt_onedir.spec
          popd

      - name: Create zip archive
        run: |
          pushd $env:GITHUB_WORKSPACE
          Compress-Archive -Path "dist/银行流水核对系统/*" -DestinationPath "bank_stmt_onedir.zip" -Force
          popd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-statement-exe
          path: bank_stmt_onedir.zip
          retention-days: 1
